<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Accordion Example</title>

    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">FAQ Accordion</h2>

    <div class="accordion" id="myAccordion">

        <div class="accordion-item">
            <h2 class="accordion-header" id="headingOne">
                <button class="accordion-button" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseOne"
                        aria-expanded="true"
                        aria-controls="collapseOne">
                    What is Bootstrap?
                </button>
            </h2>

            <div id="collapseOne" class="accordion-collapse collapse show"
                 aria-labelledby="headingOne"
                 data-bs-parent="#myAccordion">
                <div class="accordion-body">
                    Bootstrap is a popular CSS framework used for building responsive websites quickly.
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header" id="headingTwo">
                <button class="accordion-button collapsed" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseTwo"
                        aria-expanded="false"
                        aria-controls="collapseTwo">
                    Why use Bootstrap?
                </button>
            </h2>

            <div id="collapseTwo" class="accordion-collapse collapse"
                 aria-labelledby="headingTwo"
                 data-bs-parent="#myAccordion">
                <div class="accordion-body">
                    It provides pre-built components, grid system, and responsive utilities.
                </div>
            </div>
        </div>

        <div class="accordion-item">
            <h2 class="accordion-header" id="headingThree">
                <button class="accordion-button collapsed" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#collapseThree"
                        aria-expanded="false"
                        aria-controls="collapseThree">
                    Is Bootstrap JavaScript required?
                </button>
            </h2>

            <div id="collapseThree" class="accordion-collapse collapse"
                 aria-labelledby="headingThree"
                 data-bs-parent="#myAccordion">
                <div class="accordion-body">
                    Yes, for interactive components like accordion, modal, carousel you need bootstrap.bundle.js.
                </div>
            </div>
        </div>

    </div>
</div>

<script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
