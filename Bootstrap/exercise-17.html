<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap 5</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      padding-bottom: 5rem; 
      font-family: sans-serif; 
      padding-top: 2rem; 
      background-color: #fcfcfc; 
    }
    .grid-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1rem; text-align: center; margin-bottom: 1rem; border-radius: 0.5rem; }
    
  </style>
</head>
<body>

<!-- main container for my layout -->
<main class="container bg-white p-5 rounded shadow-sm border">
    <h2 class="mt-2 mb-4" style="color: #0d9488;">Icons with Bootstrap Icons</h2>
<p class="text-secondary mt-2 mb-3"><i>Notes on this:</i> install and use Bootstrap Icons as icon-only buttons</p>
<div class="d-flex gap-3 justify-content-center p-5 bg-light rounded border">
    <button class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 50px; height: 50px;"><i class="bi bi-twitter fs-4"></i></button>
    <button class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 50px; height: 50px;"><i class="bi bi-facebook fs-4"></i></button>
    <button class="btn btn-dark rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 50px; height: 50px;"><i class="bi bi-github fs-4"></i></button>
</div>
  </main>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
