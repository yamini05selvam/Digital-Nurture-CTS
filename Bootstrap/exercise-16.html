<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap 5</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      padding-bottom: 5rem; 
      font-family: sans-serif; 
      padding-top: 2rem; 
      background-color: #fcfcfc; 
    }
    .grid-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1rem; text-align: center; margin-bottom: 1rem; border-radius: 0.5rem; }
    
  </style>
</head>
<body>

<main class="container bg-white p-5 rounded shadow-sm border">
    <h2 class="mt-2 mb-4" style="color: #0d9488;">Positioning Utilities</h2>
<p class="text-secondary mt-2 mb-3"><i>My setup for this:</i> overlay badges</p>
<div class="d-flex justify-content-center py-4">
    <div class="bg-light p-5 rounded-4 shadow-sm border d-inline-block position-relative">
        <i class="bi bi-bell fs-1 text-secondary"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light border-3 p-2 fs-6">99+</span>
        <div class="mt-3 text-muted small fw-semibold text-center">Notifications</div>
    </div>
</div>
<p class="text-muted text-center mt-4">This component is generally placed at the bottom of the document body.</p>
  </main>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
