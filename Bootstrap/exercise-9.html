<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap 5</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      padding-bottom: 5rem; 
      font-family: sans-serif; 
      padding-top: 2rem; 
      background-color: #fcfcfc; 
    }
    .grid-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1rem; text-align: center; margin-bottom: 1rem; border-radius: 0.5rem; }
    
  </style>
</head>
<body>


<!-- wrapping everything in a container -->
<main class="container bg-white p-5 rounded shadow-sm border">
    <h2 class="mb-4 text-primary" style="border-bottom: 2px solid #ccc; padding-bottom: 10px;">Buttons</h2>
<p class="text-secondary mt-2 mb-3"><i>Just finishing up this section:</i> contextual classes</p>
<div class="mb-5 d-flex gap-2 flex-wrap p-4 border rounded shadow-sm">
    <button class="btn btn-primary px-4">Primary</button>
    <button class="btn btn-secondary px-4">Secondary</button>
    <button class="btn btn-outline-danger px-4">Outline Danger</button>
    <button class="btn btn-success px-4">Success</button>
</div>
<p class="text-secondary mt-2 mb-3"><i>Task:</i> button groups</p>
<div class="p-4 border rounded shadow-sm bg-light">
    <div class="btn-group shadow-sm" role="group">
        <button type="button" class="btn btn-dark px-4">Left</button>
        <button type="button" class="btn btn-outline-dark px-4">Middle</button>
        <button type="button" class="btn btn-dark px-4">Right</button>
    </div>
</div>
  </main>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
