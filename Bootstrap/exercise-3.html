<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap 5</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      padding-bottom: 5rem; 
      font-family: sans-serif; 
      padding-top: 2rem; 
      background-color: #fcfcfc; 
    }
    .grid-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1rem; text-align: center; margin-bottom: 1rem; border-radius: 0.5rem; }
    
  </style>
</head>
<body>

<!-- main container for my layout -->
<main class="container bg-white p-5 rounded shadow-sm border">
    <h2 class="mt-2 mb-4" style="color: #0d9488;">Responsive Grid Layout</h2>
<p class="text-secondary mt-2 mb-3"><i>Working on this layout:</i> three columns stacking vertically on mobile, 2-per-row on tablets, 3-per-row on desktop</p>    
<div class="row">
    <div class="col-12 col-md-6 col-lg-4"><div class="grid-box shadow-sm">Column 1</div></div>
    <div class="col-12 col-md-6 col-lg-4"><div class="grid-box shadow-sm">Column 2</div></div>
    <div class="col-12 col-md-6 col-lg-4"><div class="grid-box shadow-sm">Column 3</div></div>
</div>
  </main>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
