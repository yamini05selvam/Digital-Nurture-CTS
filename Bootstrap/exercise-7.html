<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap 5</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      padding-bottom: 5rem; 
      font-family: sans-serif; 
      padding-top: 2rem; 
      background-color: #fcfcfc; 
    }
    .grid-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1rem; text-align: center; margin-bottom: 1rem; border-radius: 0.5rem; }
    
  </style>
</head>
<body>

<!-- testing how this looks on mobile -->
<main class="container bg-white p-5 rounded shadow-sm border">
    <h2 class="mt-2 mb-4" style="color: #0d9488;">Typography</h2>
<p class="text-secondary mt-2 mb-3"><i>Working on this layout:</i> typography utilities</p>
<div class="mb-5 p-4 border rounded shadow-sm">
    <h1 class="display-5 mb-3">Display Heading</h1>
    <p class="lead text-primary">This is a lead paragraph. It stands out more.</p>
    <p class="text-muted fw-bold">This is muted but bold text.</p>
</div>
<p class="text-secondary mt-2 mb-3"><i>Task:</i> text transforms</p>
<div class="p-4 border rounded shadow-sm">
    <p class="text-uppercase border-bottom pb-2">this text is forced uppercase.</p>
    <p class="text-lowercase border-bottom pb-2">THIS TEXT IS FORCED LOWERCASE.</p>
    <p class="text-capitalize mb-0">this text is automatically capitalized.</p>
</div>
  </main>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
