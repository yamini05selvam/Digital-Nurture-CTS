<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap 5</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.css">

  <style>
    body {
      padding-bottom: 5rem; 
      font-family: sans-serif; 
      padding-top: 2rem; 
      background-color: #fcfcfc; 
    }
    .grid-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 1rem; text-align: center; margin-bottom: 1rem; border-radius: 0.5rem; }
    
  </style>
</head>
<body>


<!-- wrapping everything in a container -->
<main class="container bg-white p-5 rounded shadow-sm border">
    <h2 class="mt-2 mb-4" style="color: #0d9488;">Colors and Backgrounds</h2>
<p class="text-secondary mt-2 mb-3"><i>Just finishing up this section:</i> contextual backgrounds and gradients</p>
<div class="row text-center g-4">
    <div class="col-md-4"><div class="p-4 bg-primary text-white rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center"><h3 class="fw-bold mb-0">1,024</h3><span class="small opacity-75">bg-primary</span></div></div>
    <div class="col-md-4"><div class="p-4 bg-warning text-dark rounded-4 shadow-sm h-100 d-flex flex-column justify-content-center"><h3 class="fw-bold mb-0">87%</h3><span class="small opacity-75">bg-warning</span></div></div>
    <div class="col-md-4"><div class="p-4 bg-dark bg-gradient text-white rounded-4 shadow h-100 d-flex flex-column justify-content-center"><h3 class="fw-bold mb-0">Secure</h3><span class="small opacity-75">bg-dark bg-gradient</span></div></div>
</div>
  </main>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
