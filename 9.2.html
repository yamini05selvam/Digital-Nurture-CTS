<!DOCTYPE html>
<html>
<head>
    <title>Button Groups and Toggle Buttons</title>
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-3">Button Group</h2>

    <div class="btn-group" role="group">
        <button type="button" class="btn btn-primary">Left</button>
        <button type="button" class="btn btn-primary">Middle</button>
        <button type="button" class="btn btn-primary">Right</button>
    </div>

    <hr>

    <h2 class="mb-3">Toggle Buttons with Checkboxes</h2>

    <div class="btn-group" role="group">
        <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
        <label class="btn btn-outline-success" for="check1">HTML</label>

        <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
        <label class="btn btn-outline-success" for="check2">CSS</label>

        <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
        <label class="btn btn-outline-success" for="check3">Bootstrap</label>
    </div>

</div>

<script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
