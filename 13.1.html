<!DOCTYPE html>
<html>
<head>
    <title>Simple Dashboard</title>
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Dashboard</h1>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card bg-primary text-white text-center p-4">
                <h3>120</h3>
                <p>Total Users</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white text-center p-4">
                <h3>85</h3>
                <p>Orders</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-dark text-center p-4">
                <h3>15</h3>
                <p>Pending Tasks</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white text-center p-4">
                <h3>5</h3>
                <p>Alerts</p>
            </div>
        </div>

    </div>

    <div class="row mt-5">

        <div class="col-md-6">
            <div class="card bg-info text-white p-4">
                <h4>Notifications</h4>
                <p>You have 10 new messages.</p>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card bg-secondary text-white p-4">
                <h4>System Status</h4>
                <p>All services are running normally.</p>
            </div>
        </div>

    </div>

</div>

<script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
