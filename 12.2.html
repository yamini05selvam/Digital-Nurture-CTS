<!DOCTYPE html>
<html>
<head>
    <title>Pricing Section</title>
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Pricing Plans</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card text-center p-3 h-100">
                <div class="card-body">
                    <h3 class="card-title mb-3">Basic</h3>
                    <h2 class="mb-4">₹499</h2>
                    <p class="mb-2">1 Website</p>
                    <p class="mb-2">5 GB Storage</p>
                    <p class="mb-4">Email Support</p>
                    <button class="btn btn-primary">
                        Choose Plan
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center p-3 h-100">
                <div class="card-body">
                    <h3 class="card-title mb-3">Standard</h3>
                    <h2 class="mb-4">₹999</h2>
                    <p class="mb-2">5 Websites</p>
                    <p class="mb-2">20 GB Storage</p>
                    <p class="mb-4">Priority Support</p>
                    <button class="btn btn-success">
                        Choose Plan
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center p-3 h-100">
                <div class="card-body">
                    <h3 class="card-title mb-3">Premium</h3>
                    <h2 class="mb-4">₹1999</h2>
                    <p class="mb-2">Unlimited Websites</p>
                    <p class="mb-2">100 GB Storage</p>
                    <p class="mb-4">24/7 Support</p>
                    <button class="btn btn-danger">
                        Choose Plan
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
