<!DOCTYPE html>
<html>
<head>
    <title>Display Utilities</title>
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <div class="bg-primary text-white p-3 mb-3">
        Visible on all screen sizes
    </div>

    <div class="bg-danger text-white p-3 mb-3 d-none d-md-block">
        Hidden on mobile, visible on medium screens and larger
    </div>

    <div class="bg-success text-white p-3 d-none d-lg-flex justify-content-center align-items-center">
        Hidden on mobile and tablet, visible as flex on large screens and larger
    </div>

</div>

<script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
